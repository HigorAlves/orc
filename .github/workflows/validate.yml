name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check hook scripts, libs, bin
        run: |
          status=0
          for f in orc/hooks/scripts/*.sh orc/lib/*.sh orc/bin/*; do
            [ -e "$f" ] || continue
            bash -n "$f" || status=1
          done
          exit "$status"

      - name: Validate all JSON
        run: git ls-files '*.json' | xargs -n1 jq empty

      - name: tools.json canonical mirror in sync
        run: |
          if ! diff -u orc/lib/tools.json cli/internal/deps/tools.json; then
            echo "cli/internal/deps/tools.json has drifted from the canonical orc/lib/tools.json"
            echo "Re-copy: cp orc/lib/tools.json cli/internal/deps/tools.json"
            exit 1
          fi

      - name: Tool-check hook smoke test
        run: |
          # Hook must emit valid JSON on the missing-tools path (seam forces
          # only git present -> jq + all recommended reported missing).
          out=$(ORC_TOOLCHECK_PRESENT="git" bash orc/hooks/scripts/session-start-tool-check.sh)
          printf '%s' "$out" | jq empty
          printf '%s' "$out" | jq -e '.systemMessage | contains("jq")' >/dev/null

      - name: Callout lint (palette-only callouts)
        run: |
          bad=$(grep -rn '\[!' orc --include='*.md' | grep -vE '\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION|TYPE)\]' || true)
          if [ -n "$bad" ]; then
            echo "Non-palette callouts found:"
            echo "$bad"
            exit 1
          fi

      - name: Count drift (README + marketplace.json)
        run: |
          skills=$(ls -d orc/skills/*/ | wc -l | xargs)
          commands=$(ls orc/commands/*.md | wc -l | xargs)
          agents=$(ls orc/agents/*.md | wc -l | xargs)
          hooks=$(ls orc/hooks/scripts/*.sh | wc -l | xargs)
          fail() { echo "Count drift: expected '$1' (actual: ${skills} skills / ${commands} commands / ${agents} agents / ${hooks} hooks)"; exit 1; }
          grep -q "${skills} curated skills" README.md                    || fail "${skills} curated skills in README.md"
          grep -q "Total: ${skills} skills" README.md                     || fail "Total: ${skills} skills in README.md"
          grep -q "${commands} composite slash commands" README.md        || fail "${commands} composite slash commands in README.md"
          grep -q "# ${commands} slash commands" README.md                || fail "# ${commands} slash commands in README.md layout"
          grep -q "${agents} specialist subagents" README.md              || fail "${agents} specialist subagents in README.md"
          grep -q "${hooks} hook scripts" README.md                       || fail "${hooks} hook scripts in README.md"
          grep -q "${skills} curated skills" .claude-plugin/marketplace.json || fail "${skills} curated skills in marketplace.json"

  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin manifest (strict)
        run: claude plugin validate ./orc --strict

  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: Verify formatting
        run: test -z "$(gofmt -l .)" || { echo 'gofmt needed:'; gofmt -l .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
